apiVersion: apps/v1
kind: Deployment
metadata:
  name: torn-oc-history
spec:
  replicas: 1
  selector:
    matchLabels:
      app: torn-oc-history
  template:
    metadata:
      labels:
        app: torn-oc-history
    spec:
      securityContext:
        fsGroup: 1001
      containers:
      - name: torn-oc-history
        image: localhost:32000/torn-oc-history:0.0.2
        env:
        # Legacy environment variables (still supported)
        - name: LOGLEVEL
          value: "warn"
        - name: ENV
          value: "production"
        # New Viper-based environment variables (recommended)
        - name: TORN_OUTPUT
          value: "sheets"
        - name: TORN_INTERVAL
          value: "5m"
        - name: TORN_BOTH
          value: "true"
        - name: TORN_RANGE_NOC
          value: "History!A1"
        - name: TORN_RANGE_ALL
          value: "HistoryAll!A1"
        # Example: Override credentials file path if needed
        # - name: TORN_CREDENTIALS_FILE
        #   value: "/app/credentials.json"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: "50m"
            memory: "50Mi"
          limits:
            cpu: "100m"
            memory: "100Mi"
        volumeMounts:
        - name: env-file
          mountPath: /.env
          subPath: .env
          readOnly: true
        - name: credentials-file
          mountPath: /credentials.json
          subPath: credentials.json
          readOnly: true
      volumes:
      - name: env-file
        secret:
          secretName: torn-history-secrets
          items:
          - key: .env
            path: .env
      - name: credentials-file
        secret:
          secretName: torn-history-secrets
          items:
          - key: credentials.json
            path: credentials.json 